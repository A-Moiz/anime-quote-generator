<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Quote Generator</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <script type="module" src="./js/script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Font - Exo 2 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Google Font - Gruppo -->
    <link
      href="https://fonts.googleapis.com/css2?family=Gruppo&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Appearance icon -->
    <img
      class="appearance-btn"
      id="appearance-btn"
      src="./assets/sun-icon.png"
    />

    <!-- Search Bar -->
    <!-- From Uiverse.io by Galahhad -->
    <label class="search-label">
      <input
        type="text"
        name="text"
        class="input"
        required=""
        placeholder="Type here..."
      />
      <kbd class="slash-icon">/</kbd>
      <svg
        class="search-icon"
        xmlns="http://www.w3.org/2000/svg"
        version="1.1"
        xmlns:xlink="http://www.w3.org/1999/xlink"
        width="512"
        height="512"
        x="0"
        y="0"
        viewBox="0 0 56.966 56.966"
        style="enable-background: new 0 0 512 512"
        xml:space="preserve"
      >
        <g>
          <path
            d="M55.146 51.887 41.588 37.786A22.926 22.926 0 0 0 46.984 23c0-12.682-10.318-23-23-23s-23 10.318-23 23 10.318 23 23 23c4.761 0 9.298-1.436 13.177-4.162l13.661 14.208c.571.593 1.339.92 2.162.92.779 0 1.518-.297 2.079-.837a3.004 3.004 0 0 0 .083-4.242zM23.984 6c9.374 0 17 7.626 17 17s-7.626 17-17 17-17-7.626-17-17 7.626-17 17-17z"
            fill="currentColor"
            data-original="#000000"
            class=""
          ></path>
        </g>
      </svg>
    </label>

    <!-- Site description -->
    <h3>Daily inspiration from iconic anime characters</h3>

    <div class="main-container">
      <!-- Quote Container -->
      <div class="quote-container">
        <p class="quote-txt" id="quote"></p>
        <p class="quote-info" id="quote-info"></p>
        <img src="" id="quote-img" />
      </div>
      <button id="next-quote">Next Random Quote</button>
    </div>

    <footer>
      <p>&copy 2026 Abdul Moiz</p>
    </footer>
  </body>
</html>
