<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Quote Generator</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <script src="./js/script.js" defer></script>
    <script type="module" src="./js/home.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Font - Exo 2 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Google Font - Gruppo -->
    <link
      href="https://fonts.googleapis.com/css2?family=Gruppo&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Appearance icon -->
    <img
      class="appearance-btn"
      id="appearance-btn"
      src="./assets/sun-icon.png"
    />

    <!-- Site description -->
    <h3>Daily inspiration from iconic anime characters</h3>

    <div class="main-container">
      <!-- Quote Container -->
      <div class="quote-container">
        <p class="quote-txt" id="quote"></p>
        <p class="quote-info" id="quote-info"></p>
        <img src="" id="quote-img" />
      </div>
      <button id="next-quote">Next Random Quote</button>
      <button id="all-quotes">
        <a class="all-quotes-btn" href="./quotes.html">View All Quotes</a>
      </button>
    </div>

    <!-- Footer -->
    <footer>
      <p>&copy 2026 Abdul Moiz</p>
    </footer>
  </body>
</html>
